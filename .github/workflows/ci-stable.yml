name: CI — Stable (main)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: cd frontend-svelte && npm ci

      - name: Check i18n keys are extracted
        run: |
          cd frontend-svelte
          npm run i18n:extract || true
          git diff --exit-code src/locales/en.json || (echo "⚠️ New i18n keys found — run npm run i18n:sync" && exit 1)

      - name: Run tests
        run: pytest

