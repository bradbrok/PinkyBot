<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinky — Memories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #1E293B;
            --yellow: #FFE600;
            --white: #FFFFFF;
            --gray-light: #F1F5F9;
            --gray-mid: #94A3B8;
            --gray-dark: #334155;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --font-mono: 'Space Mono', monospace;
            --font-grotesk: 'Space Grotesk', sans-serif;
            --border: 3px solid var(--black);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: var(--font-grotesk);
            color: var(--black);
            background: var(--gray-light);
            line-height: 1.6;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: var(--border);
            background: var(--white);
        }
        .header-logo { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 700; }
        .accent { color: var(--yellow); background: var(--black); padding: 0 0.1em; }
        .header-nav { display: flex; gap: 1.5rem; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; }
        .header-nav a { color: var(--gray-mid); text-decoration: none; padding: 0.3rem 0; border-bottom: 2px solid transparent; }
        .header-nav a:hover, .header-nav a.active { color: var(--black); border-color: var(--yellow); }
        .header-status { font-family: var(--font-mono); font-size: 0.75rem; color: var(--gray-mid); }

        .content { padding: 2rem; max-width: 1400px; margin: 0 auto; }

        .section { background: var(--white); border: var(--border); margin-bottom: 2rem; }
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: var(--border); }
        .section-title { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .section-body { padding: 1.5rem; }

        .btn { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; padding: 0.4rem 0.8rem; border: 2px solid var(--black); cursor: pointer; text-transform: uppercase; background: var(--white); }
        .btn:hover { background: var(--gray-light); }
        .btn-primary { background: var(--yellow); }
        .btn-primary:hover { background: var(--black); color: var(--yellow); }
        .btn-sm { padding: 0.2rem 0.5rem; font-size: 0.65rem; }

        .form-input { font-family: var(--font-mono); font-size: 0.85rem; padding: 0.4rem 0.8rem; border: 2px solid var(--black); background: var(--white); }
        .form-input:focus { outline: none; border-color: var(--yellow); }
        .form-select { font-family: var(--font-mono); font-size: 0.85rem; padding: 0.4rem 0.8rem; border: 2px solid var(--black); background: var(--white); cursor: pointer; }
        .form-select:focus { outline: none; border-color: var(--yellow); }

        .badge { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.5rem; text-transform: uppercase; letter-spacing: 0.03em; display: inline-block; }

        .empty { padding: 2rem; text-align: center; color: var(--gray-mid); font-family: var(--font-mono); font-size: 0.85rem; }

        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 0.8rem 1.5rem; font-family: var(--font-mono); font-size: 0.8rem; font-weight: 700; border: 2px solid var(--black); background: var(--yellow); transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1000; }

        /* ── Controls Bar ── */
        .controls { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; margin-bottom: 1.5rem; }
        .controls-group { display: flex; gap: 0.5rem; align-items: center; }
        .controls-label { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--gray-mid); white-space: nowrap; }
        .search-bar { display: flex; gap: 0; flex: 1; min-width: 250px; }
        .search-bar .form-input { flex: 1; border-right: none; }
        .search-bar .btn { border-left: none; }

        /* ── Stats Bar ── */
        .stats-bar { display: flex; gap: 2rem; flex-wrap: wrap; padding: 1rem 1.5rem; font-family: var(--font-mono); font-size: 0.8rem; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-value { font-size: 1.4rem; font-weight: 700; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: var(--gray-mid); letter-spacing: 0.05em; }

        /* ── Filter Toolbar ── */
        .filter-bar { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; padding: 1rem 1.5rem; border-top: 1px solid #e2e8f0; }
        .toggle-btn { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700; padding: 0.3rem 0.6rem; border: 2px solid var(--gray-mid); background: var(--white); cursor: pointer; text-transform: uppercase; color: var(--gray-mid); }
        .toggle-btn.active { border-color: var(--black); color: var(--black); background: var(--yellow); }

        /* ── Memory Cards Grid ── */
        .memory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1rem; }

        .memory-card {
            background: var(--white);
            border: 2px solid #e2e8f0;
            border-left: 5px solid var(--gray-mid);
            padding: 1.2rem;
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s;
            position: relative;
        }
        .memory-card:hover { border-color: var(--black); box-shadow: 4px 4px 0 rgba(30,41,59,0.08); }
        .memory-card.type-insight { border-left-color: var(--blue); }
        .memory-card.type-fact { border-left-color: var(--gray-dark); }
        .memory-card.type-project_state { border-left-color: var(--green); }
        .memory-card.type-interaction_pattern { border-left-color: var(--yellow); }
        .memory-card.type-continuation { border-left-color: var(--gray-mid); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.6rem; }
        .type-badge { font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700; padding: 0.15rem 0.5rem; text-transform: uppercase; letter-spacing: 0.03em; }
        .type-badge.insight { background: #dbeafe; color: #1e40af; }
        .type-badge.fact { background: #e2e8f0; color: var(--gray-dark); }
        .type-badge.project_state { background: #dcfce7; color: #166534; }
        .type-badge.interaction_pattern { background: #fef9c3; color: #854d0e; }
        .type-badge.continuation { background: #f1f5f9; color: var(--gray-mid); }

        .salience-dots { display: flex; gap: 3px; }
        .salience-dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--gray-mid); }
        .salience-dot.filled { background: var(--yellow); border-color: var(--yellow); }

        .card-content { font-size: 0.88rem; line-height: 1.5; margin-bottom: 0.6rem; color: var(--black); word-break: break-word; }
        .card-content.truncated { max-height: 4.5em; overflow: hidden; position: relative; }
        .card-content.truncated::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1.5em;
            background: linear-gradient(transparent, var(--white));
        }

        .card-context { font-size: 0.78rem; color: var(--gray-mid); margin-bottom: 0.6rem; line-height: 1.4; }

        .card-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
        .card-tag { font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700; padding: 0.1rem 0.4rem; background: #f1f5f9; color: var(--gray-dark); text-transform: uppercase; }
        .card-tag.project { background: #f3e8ff; color: #6b21a8; }
        .card-tag.entity { background: #dbeafe; color: #1e40af; }
        .card-tag.source { background: #fef3c7; color: #92400e; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 0.65rem; color: var(--gray-mid); padding-top: 0.6rem; border-top: 1px solid #f1f5f9; }
        .card-footer-left { display: flex; gap: 1rem; }
        .card-inactive { opacity: 0.5; }

        /* ── Pagination ── */
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(30,41,59,0.85);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--white);
            border: var(--border);
            max-width: 700px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1.5rem;
            border-bottom: var(--border);
        }
        .modal-title { font-family: var(--font-mono); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; }
        .modal-close { font-family: var(--font-mono); font-size: 1.2rem; cursor: pointer; background: none; border: none; color: var(--gray-mid); padding: 0.2rem 0.5rem; }
        .modal-close:hover { color: var(--black); }
        .modal-body { padding: 1.5rem; }

        .detail-field { margin-bottom: 1rem; }
        .detail-label { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--gray-mid); margin-bottom: 0.3rem; }
        .detail-value { font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.6; }

        .detail-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

        .linked-memories { margin-top: 1rem; }
        .linked-card { padding: 0.8rem; border: 1px solid #e2e8f0; margin-bottom: 0.5rem; cursor: pointer; }
        .linked-card:hover { border-color: var(--black); }
        .linked-type { font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: var(--gray-mid); }
        .linked-content { font-size: 0.82rem; margin-top: 0.2rem; }
        .linked-rel { font-family: var(--font-mono); font-size: 0.6rem; color: var(--blue); margin-top: 0.2rem; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .header { flex-direction: column; gap: 0.8rem; padding: 0.8rem 1rem; align-items: flex-start; }
            .header-nav { gap: 1rem; font-size: 0.7rem; flex-wrap: wrap; }
            .content { padding: 0.8rem; }
            .memory-grid { grid-template-columns: 1fr; }
            .detail-meta-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: stretch; }
            .stats-bar { gap: 1rem; }
            .filter-bar { gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-logo">Pinky<span class="accent">Bot</span></div>
        <nav class="header-nav">
            <a href="/dashboard">Dashboard</a>
            <a href="/chat">Chat</a>
            <a href="/agents-ui">Agents</a>
            <a href="/fleet">Fleet</a>
            <a href="/memories" class="active">Memories</a>
            <a href="/tasks-ui">Tasks</a>
            <a href="/settings">Settings</a>
        </nav>
        <div class="header-status" id="status">Loading...</div>
    </div>

    <div class="content">
        <!-- Agent Selector + Search -->
        <div class="controls">
            <div class="controls-group">
                <span class="controls-label">Agent:</span>
                <select class="form-select" id="agentSelect" onchange="onAgentChange()">
                    <option value="">Select agent...</option>
                </select>
            </div>
            <div class="search-bar">
                <input type="text" class="form-input" id="searchInput" placeholder="Search memories..." onkeydown="if(event.key==='Enter')doSearch()">
                <button class="btn btn-primary" onclick="doSearch()">Search</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="section" id="statsSection" style="display:none">
            <div class="stats-bar" id="statsBar"></div>
            <div class="filter-bar" id="filterBar">
                <span class="controls-label">Type:</span>
                <select class="form-select" id="filterType" onchange="applyFilters()" style="font-size:0.75rem;padding:0.3rem 0.5rem">
                    <option value="">All types</option>
                    <option value="insight">Insight</option>
                    <option value="fact">Fact</option>
                    <option value="project_state">Project State</option>
                    <option value="interaction_pattern">Interaction Pattern</option>
                    <option value="continuation">Continuation</option>
                </select>

                <span class="controls-label">Project:</span>
                <select class="form-select" id="filterProject" onchange="applyFilters()" style="font-size:0.75rem;padding:0.3rem 0.5rem">
                    <option value="">All projects</option>
                </select>

                <span class="controls-label">Salience:</span>
                <select class="form-select" id="filterSalience" onchange="applyFilters()" style="font-size:0.75rem;padding:0.3rem 0.5rem">
                    <option value="">All</option>
                    <option value="high">High (4-5)</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>

                <span class="controls-label">Sort:</span>
                <select class="form-select" id="filterSort" onchange="applyFilters()" style="font-size:0.75rem;padding:0.3rem 0.5rem">
                    <option value="created_at">Created</option>
                    <option value="accessed_at">Accessed</option>
                    <option value="salience">Salience</option>
                    <option value="access_count">Access Count</option>
                </select>

                <button class="toggle-btn active" id="toggleActive" onclick="toggleActiveOnly()">Active Only</button>
            </div>
        </div>

        <!-- Memory Grid -->
        <div class="memory-grid" id="memoryGrid"></div>
        <div class="empty" id="emptyState" style="display:none">No memories found. Select an agent above to browse.</div>

        <!-- Pagination -->
        <div class="pagination" id="pagination" style="display:none">
            <button class="btn" id="btnPrev" onclick="prevPage()" disabled>Prev</button>
            <span class="controls-label" id="pageInfo" style="align-self:center"></span>
            <button class="btn" id="btnNext" onclick="nextPage()">Next</button>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Memory Detail</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

<script>
const API = window.location.origin;

async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetch(`${API}${path}`, opts);
    if (!resp.ok) throw new Error(`API error: ${resp.status}`);
    return resp.json();
}

function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = type === 'error' ? 'var(--red)' : 'var(--yellow)';
    el.style.color = type === 'error' ? 'var(--white)' : 'var(--black)';
    el.style.transform = 'translateY(0)';
    el.style.opacity = '1';
    setTimeout(() => { el.style.transform = 'translateY(100px)'; el.style.opacity = '0'; }, 3000);
}

// ── State ──
let currentAgent = '';
let memories = [];
let currentOffset = 0;
const PAGE_SIZE = 24;
let totalCount = 0;
let isSearchMode = false;
let activeOnly = true;

// ── Init ──
async function init() {
    try {
        const agents = await api('GET', '/agents');
        const sel = document.getElementById('agentSelect');
        const list = Array.isArray(agents) ? agents : (agents.agents || []);
        list.forEach(a => {
            const name = typeof a === 'string' ? a : a.name;
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            sel.appendChild(opt);
        });
        document.getElementById('status').textContent = `${list.length} agents`;
    } catch (e) {
        document.getElementById('status').textContent = 'Error loading agents';
        toast('Failed to load agents', 'error');
    }
}

async function onAgentChange() {
    currentAgent = document.getElementById('agentSelect').value;
    currentOffset = 0;
    isSearchMode = false;
    document.getElementById('searchInput').value = '';
    if (!currentAgent) {
        document.getElementById('statsSection').style.display = 'none';
        document.getElementById('memoryGrid').innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('pagination').style.display = 'none';
        return;
    }
    await Promise.all([loadStats(), loadMemories()]);
}

async function loadStats() {
    try {
        const stats = await api('GET', `/agents/${currentAgent}/memories/stats`);
        const bar = document.getElementById('statsBar');
        const byType = stats.by_type || {};
        const byProject = stats.by_project || {};

        bar.innerHTML = `
            <div class="stat-item"><div class="stat-value">${stats.total || 0}</div><div class="stat-label">Total</div></div>
            ${Object.entries(byType).map(([k, v]) => `
                <div class="stat-item"><div class="stat-value">${v}</div><div class="stat-label">${k.replace('_', ' ')}</div></div>
            `).join('')}
        `;

        // Populate project filter
        const projSel = document.getElementById('filterProject');
        projSel.innerHTML = '<option value="">All projects</option>';
        Object.keys(byProject).forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = `${p} (${byProject[p]})`;
            projSel.appendChild(opt);
        });

        document.getElementById('statsSection').style.display = 'block';
    } catch (e) {
        console.error('Stats error:', e);
    }
}

async function loadMemories() {
    const grid = document.getElementById('memoryGrid');
    const empty = document.getElementById('emptyState');
    const pag = document.getElementById('pagination');

    try {
        const params = new URLSearchParams();
        params.set('limit', PAGE_SIZE);
        params.set('offset', currentOffset);

        const type = document.getElementById('filterType').value;
        if (type) params.set('type', type);

        const project = document.getElementById('filterProject').value;
        if (project) params.set('project', project);

        const salience = document.getElementById('filterSalience').value;
        if (salience === 'high') {
            params.set('min_salience', 4);
        } else if (salience) {
            params.set('min_salience', salience);
            params.set('max_salience', salience);
        }

        const sort = document.getElementById('filterSort').value;
        if (sort) params.set('sort', sort);

        if (activeOnly) params.set('active', 'true');

        const data = await api('GET', `/agents/${currentAgent}/memories?${params}`);
        const items = Array.isArray(data) ? data : (data.memories || data.items || []);
        totalCount = data.total || items.length;
        memories = items;

        renderGrid(items);
        updatePagination();
    } catch (e) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        empty.textContent = 'Failed to load memories.';
        pag.style.display = 'none';
        toast('Failed to load memories', 'error');
    }
}

async function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q || !currentAgent) return;

    isSearchMode = true;
    currentOffset = 0;

    try {
        const params = new URLSearchParams();
        params.set('q', q);
        params.set('limit', PAGE_SIZE);
        const data = await api('GET', `/agents/${currentAgent}/memories/search?${params}`);
        const items = Array.isArray(data) ? data : (data.memories || data.results || data.items || []);
        totalCount = data.total || items.length;
        memories = items;
        renderGrid(items);
        updatePagination();
        toast(`Found ${totalCount} results`);
    } catch (e) {
        toast('Search failed', 'error');
    }
}

function applyFilters() {
    isSearchMode = false;
    currentOffset = 0;
    loadMemories();
}

function toggleActiveOnly() {
    activeOnly = !activeOnly;
    const btn = document.getElementById('toggleActive');
    btn.classList.toggle('active', activeOnly);
    applyFilters();
}

// ── Render ──
function renderGrid(items) {
    const grid = document.getElementById('memoryGrid');
    const empty = document.getElementById('emptyState');

    if (!items.length) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        empty.textContent = isSearchMode ? 'No results found.' : 'No memories for this agent.';
        return;
    }

    empty.style.display = 'none';
    grid.innerHTML = items.map(m => renderCard(m)).join('');
}

function renderCard(m) {
    const type = m.type || 'fact';
    const salience = m.salience || 0;
    const content = m.content || '';
    const truncated = content.length > 200;
    const displayContent = truncated ? content.substring(0, 200) + '...' : content;
    const context = m.context || '';
    const project = m.project || '';
    const entities = m.entities || [];
    const source = m.source_channel || '';
    const created = m.created_at ? new Date(m.created_at).toLocaleDateString() : '--';
    const accessCount = m.access_count || 0;
    const weight = m.weight != null ? m.weight.toFixed(2) : '--';
    const isActive = m.active !== false;
    const id = m.id || m._id || '';

    const salienceDots = Array.from({length: 5}, (_, i) =>
        `<div class="salience-dot${i < salience ? ' filled' : ''}"></div>`
    ).join('');

    const tags = [];
    if (project) tags.push(`<span class="card-tag project">${esc(project)}</span>`);
    if (source) tags.push(`<span class="card-tag source">${esc(source)}</span>`);
    entities.forEach(e => tags.push(`<span class="card-tag entity">${esc(typeof e === 'string' ? e : e.name || e)}</span>`));

    return `
        <div class="memory-card type-${type}${isActive ? '' : ' card-inactive'}" onclick="openDetail('${esc(id)}')">
            <div class="card-header">
                <span class="type-badge ${type}">${type.replace('_', ' ')}</span>
                <div class="salience-dots">${salienceDots}</div>
            </div>
            <div class="card-content${truncated ? ' truncated' : ''}">${esc(displayContent)}</div>
            ${context ? `<div class="card-context">${esc(context.substring(0, 120))}</div>` : ''}
            ${tags.length ? `<div class="card-tags">${tags.join('')}</div>` : ''}
            <div class="card-footer">
                <div class="card-footer-left">
                    <span>${created}</span>
                    <span>${accessCount} views</span>
                    <span>w: ${weight}</span>
                </div>
                ${!isActive ? '<span style="color:var(--red)">INACTIVE</span>' : ''}
            </div>
        </div>
    `;
}

function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
}

// ── Pagination ──
function updatePagination() {
    const pag = document.getElementById('pagination');
    const info = document.getElementById('pageInfo');
    const prev = document.getElementById('btnPrev');
    const next = document.getElementById('btnNext');

    if (totalCount <= PAGE_SIZE && currentOffset === 0) {
        pag.style.display = 'none';
        return;
    }

    pag.style.display = 'flex';
    const page = Math.floor(currentOffset / PAGE_SIZE) + 1;
    const totalPages = Math.ceil(totalCount / PAGE_SIZE);
    info.textContent = `Page ${page} of ${totalPages}`;
    prev.disabled = currentOffset === 0;
    next.disabled = currentOffset + PAGE_SIZE >= totalCount;
}

function prevPage() {
    currentOffset = Math.max(0, currentOffset - PAGE_SIZE);
    loadMemories();
}

function nextPage() {
    currentOffset += PAGE_SIZE;
    loadMemories();
}

// ── Detail Modal ──
async function openDetail(id) {
    if (!id || !currentAgent) return;

    try {
        const [memory, links] = await Promise.all([
            api('GET', `/agents/${currentAgent}/memories/${id}`),
            api('GET', `/agents/${currentAgent}/memories/${id}/links`).catch(() => [])
        ]);

        const m = memory.memory || memory;
        const linkedItems = Array.isArray(links) ? links : (links.links || links.memories || []);

        const type = m.type || 'fact';
        const salience = m.salience || 0;
        const salienceDots = Array.from({length: 5}, (_, i) =>
            `<div class="salience-dot${i < salience ? ' filled' : ''}" style="display:inline-block"></div>`
        ).join('');

        const created = m.created_at ? new Date(m.created_at).toLocaleString() : '--';
        const accessed = m.accessed_at ? new Date(m.accessed_at).toLocaleString() : '--';
        const superseded = m.superseded_by || '--';
        const entities = (m.entities || []).map(e => typeof e === 'string' ? e : e.name || e).join(', ') || '--';

        document.getElementById('modalTitle').textContent = `${type.replace('_', ' ')} Memory`;
        document.getElementById('modalBody').innerHTML = `
            <div class="detail-field">
                <div class="detail-label">Type</div>
                <span class="type-badge ${type}" style="display:inline-block">${type.replace('_', ' ')}</span>
                <span style="margin-left:1rem">Salience: <span style="display:inline-flex;gap:3px;vertical-align:middle">${salienceDots}</span></span>
                ${m.active === false ? '<span style="margin-left:1rem;color:var(--red);font-family:var(--font-mono);font-size:0.75rem">INACTIVE</span>' : ''}
            </div>

            <div class="detail-field">
                <div class="detail-label">Content</div>
                <div class="detail-value" style="white-space:pre-wrap">${esc(m.content || '')}</div>
            </div>

            ${m.context ? `<div class="detail-field">
                <div class="detail-label">Context</div>
                <div class="detail-value" style="color:var(--gray-mid);white-space:pre-wrap">${esc(m.context)}</div>
            </div>` : ''}

            <div class="detail-meta-grid">
                <div class="detail-field">
                    <div class="detail-label">Created</div>
                    <div class="detail-value">${created}</div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">Last Accessed</div>
                    <div class="detail-value">${accessed}</div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">Access Count</div>
                    <div class="detail-value">${m.access_count || 0}</div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">Weight</div>
                    <div class="detail-value">${m.weight != null ? m.weight.toFixed(2) : '--'}</div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">Project</div>
                    <div class="detail-value">${esc(m.project || '--')}</div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">Source Channel</div>
                    <div class="detail-value">${esc(m.source_channel || '--')}</div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">Entities</div>
                    <div class="detail-value">${esc(entities)}</div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">Superseded By</div>
                    <div class="detail-value">${esc(String(superseded))}</div>
                </div>
            </div>

            ${linkedItems.length ? `
                <div class="linked-memories">
                    <div class="detail-label" style="margin-bottom:0.5rem">Linked Memories (${linkedItems.length})</div>
                    ${linkedItems.map(l => {
                        const lm = l.memory || l;
                        const lid = lm.id || lm._id || '';
                        return `<div class="linked-card" onclick="event.stopPropagation();closeModal();openDetail('${esc(lid)}')">
                            <div class="linked-type">${esc((lm.type || 'fact').replace('_', ' '))}${l.relationship ? ` / ${esc(l.relationship)}` : ''}</div>
                            <div class="linked-content">${esc((lm.content || '').substring(0, 150))}</div>
                            ${l.relationship ? `<div class="linked-rel">${esc(l.relationship)}</div>` : ''}
                        </div>`;
                    }).join('')}
                </div>
            ` : ''}
        `;

        document.getElementById('modalOverlay').classList.add('open');
    } catch (e) {
        toast('Failed to load memory detail', 'error');
    }
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}

// Close modal on Escape
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

// ── Boot ──
init();
</script>
</body>
</html>
