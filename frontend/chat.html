<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinky — Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #1E293B;
            --yellow: #FFE600;
            --white: #FFFFFF;
            --gray-light: #F1F5F9;
            --gray-mid: #94A3B8;
            --gray-dark: #334155;
            --font-mono: 'Space Mono', monospace;
            --font-grotesk: 'Space Grotesk', sans-serif;
            --border: 3px solid var(--black);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: var(--font-grotesk);
            color: var(--black);
            background: var(--white);
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: var(--border);
            background: var(--white);
        }
        .header-logo {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: 700;
        }
        .header-logo .accent { color: var(--yellow); background: var(--black); padding: 0 0.1em; }
        .header-status {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--gray-mid);
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            margin-right: 0.4rem;
        }
        .status-dot.disconnected { background: #ef4444; }

        /* ── Main Layout ── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 280px;
            border-right: var(--border);
            display: flex;
            flex-direction: column;
            background: var(--gray-light);
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: var(--border);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-new {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.4rem 0.8rem;
            background: var(--black);
            color: var(--yellow);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-new:hover { background: var(--yellow); color: var(--black); outline: 2px solid var(--black); }
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .agent-group { margin-bottom: 0.5rem; }
        .agent-group-header {
            padding: 0.6rem 0.8rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gray-dark);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .agent-group-header:hover { background: var(--white); }
        .agent-group-header .agent-model {
            font-size: 0.6rem;
            color: var(--gray-mid);
            font-weight: 400;
        }
        .session-item {
            padding: 0.5rem 0.8rem 0.5rem 1.4rem;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            border: 2px solid transparent;
            margin-bottom: 1px;
        }
        .session-item:hover { background: var(--white); }
        .session-item.active { background: var(--yellow); border-color: var(--black); }
        .session-item .session-id { font-weight: 700; font-size: 0.7rem; }
        .session-item .session-meta { color: var(--gray-mid); font-size: 0.65rem; margin-top: 0.1rem; }
        .session-item.main-session { border-left: 3px solid var(--yellow); }

        /* ── Chat Area ── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-info {
            padding: 0.8rem 1.5rem;
            border-bottom: var(--border);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--gray-mid);
            display: flex;
            gap: 2rem;
        }
        .chat-info span { display: flex; align-items: center; gap: 0.3rem; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 75%;
            padding: 1rem 1.2rem;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .message.user {
            align-self: flex-end;
            background: var(--black);
            color: var(--white);
            border: var(--border);
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--gray-light);
            border: var(--border);
        }
        .message .meta {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--gray-mid);
            margin-top: 0.5rem;
        }
        .message.user .meta { color: var(--gray-mid); }
        .message.assistant .meta { color: var(--gray-mid); }
        .message.system {
            align-self: center;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--gray-mid);
            padding: 0.5rem;
        }

        /* ── Markdown rendering ── */
        .message code {
            font-family: var(--font-mono);
            font-size: 0.82em;
            padding: 0.2em 0.5em;
            border-radius: 2px;
            word-break: break-word;
        }
        .message.assistant code { background: #e2e8f0; color: var(--black); }
        .message.user code { background: rgba(255,255,255,0.15); color: var(--white); }
        .message pre {
            margin: 0.8rem 0;
            padding: 1.2rem 1.4rem;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            line-height: 1.6;
            border-radius: 0;
            position: relative;
        }
        .message.assistant pre {
            background: #0f172a;
            color: #e2e8f0;
            border-left: 4px solid var(--yellow);
        }
        .message.user pre {
            background: rgba(0,0,0,0.4);
            color: #e2e8f0;
            border-left: 4px solid rgba(255,255,255,0.3);
        }
        .message pre code {
            background: none !important;
            padding: 0 !important;
            color: inherit !important;
            font-size: inherit;
            border-radius: 0;
        }
        .message pre .lang-label {
            position: absolute;
            top: 0;
            right: 0;
            font-size: 0.65rem;
            padding: 0.2rem 0.6rem;
            background: var(--yellow);
            color: var(--black);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .message strong { font-weight: 700; }
        .message em { font-style: italic; }
        .message ul, .message ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .message li { margin-bottom: 0.3rem; line-height: 1.5; }
        .message p { margin-bottom: 0.5rem; }
        .message p:last-child { margin-bottom: 0; }
        .message blockquote {
            border-left: 3px solid var(--yellow);
            padding-left: 0.8rem;
            margin: 0.5rem 0;
            color: var(--gray-dark);
            font-style: italic;
        }
        .message h1, .message h2, .message h3 {
            font-family: var(--font-mono);
            margin: 0.8rem 0 0.4rem;
        }
        .message h1 { font-size: 1.2em; }
        .message h2 { font-size: 1.1em; }
        .message h3 { font-size: 1em; }
        .message a { color: var(--yellow); background: var(--black); padding: 0 0.2em; }
        .message.user a { color: var(--yellow); }

        /* ── Tables ── */
        .message table {
            border-collapse: collapse;
            margin: 0.8rem 0;
            font-size: 0.88rem;
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            display: block;
        }
        .message thead th {
            font-family: var(--font-mono);
            font-weight: 700;
            text-align: left;
            padding: 0.5rem 0.8rem;
            border-bottom: 3px solid var(--black);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .message.assistant thead th { background: var(--gray-light); }
        .message tbody td {
            padding: 0.4rem 0.8rem;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: top;
        }
        .message tbody tr:hover td { background: #fefce8; }
        .message.user thead th { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); }
        .message.user tbody td { border-color: rgba(255,255,255,0.1); }
        .message.user tbody tr:hover td { background: rgba(255,255,255,0.05); }

        /* ── Input ── */
        .input-area {
            padding: 1rem 2rem;
            border-top: var(--border);
            display: flex;
            gap: 0.8rem;
        }
        .input-area input {
            flex: 1;
            font-family: var(--font-grotesk);
            font-size: 1rem;
            padding: 0.8rem 1rem;
            border: var(--border);
            outline: none;
        }
        .input-area input:focus { border-color: var(--yellow); background: #fffde6; }
        .input-area button {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.8rem 1.5rem;
            background: var(--yellow);
            color: var(--black);
            border: var(--border);
            cursor: pointer;
            text-transform: uppercase;
        }
        .input-area button:hover { background: var(--black); color: var(--yellow); }
        .input-area button:disabled { background: var(--gray-light); color: var(--gray-mid); cursor: not-allowed; }

        /* ── Empty State ── */
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            color: var(--gray-mid);
            font-size: 0.9rem;
        }

        /* ── Thinking indicator ── */
        .thinking { display: none; padding: 0.5rem 1.2rem; }
        .thinking.visible { display: block; }
        .thinking-dots { font-family: var(--font-mono); color: var(--gray-mid); }

        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: var(--border);
                max-height: 40vh;
                overflow-y: auto;
            }
            .sidebar.collapsed { max-height: 0; overflow: hidden; border-bottom: none; }
            .sidebar-toggle {
                display: block;
                width: 100%;
                padding: 0.5rem;
                font-family: var(--font-mono);
                font-size: 0.7rem;
                text-align: center;
                background: var(--gray-light);
                border: none;
                border-bottom: var(--border);
                cursor: pointer;
                text-transform: uppercase;
                color: var(--gray-mid);
            }
        }
        @media (min-width: 769px) {
            .sidebar-toggle { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-logo">PINKY<span class="accent">.</span> CHAT</div>
        <div style="display:flex;gap:1.5rem;font-family:var(--font-mono);font-size:0.8rem;text-transform:uppercase">
            <a href="/" style="color:var(--gray-mid);text-decoration:none">Dashboard</a>
            <a href="/chat" style="color:var(--black);text-decoration:none;border-bottom:2px solid var(--yellow);padding-bottom:0.2rem">Chat</a>
            <a href="/fleet" style="color:var(--gray-mid);text-decoration:none">Fleet</a>
            <a href="/agents-ui" style="color:var(--gray-mid);text-decoration:none">Agents</a>
            <a href="/settings" style="color:var(--gray-mid);text-decoration:none">Settings</a>
        </div>
        <div class="header-status">
            <span><span class="status-dot" id="statusDot"></span> <span id="statusText">connecting...</span></span>
            <span id="sessionCount">0 sessions</span>
        </div>
    </div>

    <div class="main">
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">▼ Select Agent</button>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                Agents
                <a href="/agents-ui" class="btn-new">+ New</a>
            </div>
            <div class="session-list" id="sessionList"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty-state" id="emptyState">
                Select an agent to start chatting
            </div>

            <div class="chat-info" id="chatInfo" style="display:none">
                <span>Model: <strong id="infoModel">--</strong></span>
                <span>Context: <strong id="infoContext">0%</strong></span>
                <span>Messages: <strong id="infoMessages">0</strong></span>
                <span>Session: <strong id="infoSession">--</strong></span>
            </div>

            <div class="messages" id="messages" style="display:none"></div>

            <div class="input-area" id="inputArea" style="display:none">
                <input type="text" id="messageInput" placeholder="Type a message..."
                    onkeydown="if(event.key==='Enter')sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let activeSession = null;
        let activeAgent = null;

        // ── API Calls ──

        async function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(`${API}${path}`, opts);
            return resp.json();
        }

        // ── Agents + Sessions ──

        async function refreshSessions() {
            try {
                const [agentsData, sessions] = await Promise.all([
                    api('GET', '/agents'),
                    api('GET', '/sessions'),
                ]);
                document.getElementById('statusDot').className = 'status-dot';
                document.getElementById('statusText').textContent = 'connected';
                document.getElementById('sessionCount').textContent = `${agentsData.count} agent${agentsData.count !== 1 ? 's' : ''}`;

                // Group sessions by agent
                const agentNames = new Set(agentsData.agents.map(a => a.name));
                const agentSessions = {};
                const orphanSessions = [];
                for (const s of sessions) {
                    let matched = false;
                    for (const aName of agentNames) {
                        if (s.id.startsWith(aName + '-') || s.id === aName) {
                            if (!agentSessions[aName]) agentSessions[aName] = [];
                            agentSessions[aName].push(s);
                            matched = true;
                            break;
                        }
                    }
                    if (!matched) orphanSessions.push(s);
                }

                const list = document.getElementById('sessionList');
                list.innerHTML = '';

                // Render agents with their sessions
                for (const agent of agentsData.agents) {
                    const aSessions = agentSessions[agent.name] || [];
                    const group = document.createElement('div');
                    group.className = 'agent-group';

                    // Agent header — clicking selects the main (first) session
                    const header = document.createElement('div');
                    header.className = 'agent-group-header';
                    header.innerHTML = `
                        <span>${agent.display_name || agent.name}</span>
                        <span class="agent-model">${agent.model} | ${aSessions.length} sess</span>
                    `;
                    header.onclick = () => {
                        if (aSessions.length > 0) {
                            selectSession(aSessions[0].id, agent.name);
                        }
                    };
                    group.appendChild(header);

                    // Sessions under this agent
                    aSessions.forEach((s, i) => {
                        const el = document.createElement('div');
                        el.className = `session-item${activeSession === s.id ? ' active' : ''}${i === 0 ? ' main-session' : ''}`;
                        el.innerHTML = `
                            <div class="session-id">${i === 0 ? '* ' : '  '}${s.id}</div>
                            <div class="session-meta">${s.message_count} msgs | ${s.context_used_pct}% ctx</div>
                        `;
                        el.onclick = () => selectSession(s.id, agent.name);
                        group.appendChild(el);
                    });

                    list.appendChild(group);
                }

                // Orphan sessions
                if (orphanSessions.length > 0) {
                    const orphanGroup = document.createElement('div');
                    orphanGroup.className = 'agent-group';
                    const orphanHeader = document.createElement('div');
                    orphanHeader.className = 'agent-group-header';
                    orphanHeader.innerHTML = '<span style="color:var(--gray-mid)">Standalone</span>';
                    orphanGroup.appendChild(orphanHeader);
                    for (const s of orphanSessions) {
                        const el = document.createElement('div');
                        el.className = `session-item${activeSession === s.id ? ' active' : ''}`;
                        el.innerHTML = `
                            <div class="session-id">${s.id}</div>
                            <div class="session-meta">${s.model || 'default'} | ${s.message_count} msgs</div>
                        `;
                        el.onclick = () => selectSession(s.id, null);
                        orphanGroup.appendChild(el);
                    }
                    list.appendChild(orphanGroup);
                }

                // Auto-select from URL hash
                if (!activeSession && window.location.hash) {
                    const hashId = window.location.hash.substring(1);
                    if (sessions.find(s => s.id === hashId)) {
                        selectSession(hashId);
                    }
                }
            } catch {
                document.getElementById('statusDot').className = 'status-dot disconnected';
                document.getElementById('statusText').textContent = 'disconnected';
            }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const btn = document.getElementById('sidebarToggle');
            sb.classList.toggle('collapsed');
            btn.textContent = sb.classList.contains('collapsed') ? '▼ Select Agent' : '▲ Hide Agents';
        }

        async function selectSession(id, agentName) {
            activeSession = id;
            activeAgent = agentName || null;
            // Auto-collapse sidebar on mobile
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('collapsed');
                document.getElementById('sidebarToggle').textContent = '▼ ' + (agentName || id);
            }
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatInfo').style.display = 'flex';
            document.getElementById('messages').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('messageInput').focus();

            await refreshSessions();
            await refreshChat();
        }

        // ── Chat ──

        async function refreshChat() {
            if (!activeSession) return;

            const [session, history, context] = await Promise.all([
                api('GET', `/sessions/${activeSession}`),
                api('GET', `/sessions/${activeSession}/history`),
                api('GET', `/sessions/${activeSession}/context`),
            ]);

            document.getElementById('infoModel').textContent = session.model || 'default';
            document.getElementById('infoContext').textContent = `${context.context_used_pct}%`;
            document.getElementById('infoMessages').textContent = session.message_count;
            document.getElementById('infoSession').textContent = session.id;

            const container = document.getElementById('messages');
            container.innerHTML = '';

            for (const msg of history.messages) {
                addMessageToUI(msg.role, msg.content, msg.duration_ms);
            }

            container.scrollTop = container.scrollHeight;
        }

        function addMessageToUI(role, content, durationMs) {
            const container = document.getElementById('messages');
            const el = document.createElement('div');
            el.className = `message ${role}`;

            const meta = role === 'assistant' && durationMs
                ? `<div class="meta">${(durationMs / 1000).toFixed(1)}s</div>`
                : '';

            const rendered = role === 'user' ? escapeHtml(content) : renderMarkdown(content);
            el.innerHTML = `${rendered}${meta}`;
            container.appendChild(el);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            if (!activeSession) return;
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            addMessageToUI('user', text);

            // Show thinking
            const thinking = document.createElement('div');
            thinking.className = 'message system';
            thinking.innerHTML = '<span class="thinking-dots">thinking...</span>';
            document.getElementById('messages').appendChild(thinking);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

            try {
                const data = await api('POST', `/sessions/${activeSession}/message`, { content: text });
                thinking.remove();
                addMessageToUI('assistant', data.content, data.duration_ms);

                // Refresh sidebar
                await refreshSessions();
                const context = await api('GET', `/sessions/${activeSession}/context`);
                document.getElementById('infoContext').textContent = `${context.context_used_pct}%`;
                document.getElementById('infoMessages').textContent = parseInt(document.getElementById('infoMessages').textContent) + 2;
            } catch (e) {
                thinking.remove();
                addMessageToUI('system', `Error: ${e.message}`);
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            // Lightweight markdown -> HTML renderer (no deps)
            // Step 1: Extract code blocks BEFORE escaping (they're preserved raw)
            const codeBlocks = [];
            let processed = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                const idx = codeBlocks.length;
                const label = lang ? `<span class="lang-label">${lang}</span>` : '';
                codeBlocks.push(`<pre>${label}<code>${escapeHtml(code.trim())}</code></pre>`);
                return `\x00CB${idx}\x00`;
            });

            const inlineCodes = [];
            processed = processed.replace(/`([^`]+)`/g, (_, code) => {
                const idx = inlineCodes.length;
                inlineCodes.push(`<code>${escapeHtml(code)}</code>`);
                return `\x00IC${idx}\x00`;
            });

            // Step 2: Escape remaining HTML
            processed = escapeHtml(processed);

            // Step 3: Apply markdown formatting
            // Headers
            processed = processed.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            processed = processed.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            processed = processed.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // Bold
            processed = processed.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // Italic
            processed = processed.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // Blockquotes
            processed = processed.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

            // Unordered lists
            processed = processed.replace(/^- (.+)$/gm, '<li>$1</li>');
            processed = processed.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

            // Ordered lists
            processed = processed.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

            // Tables: | col | col |\n|---|---|\n| val | val |
            processed = processed.replace(
                /((?:^\|.+\|$\n?)+)/gm,
                (tableBlock) => {
                    const rows = tableBlock.trim().split('\n').filter(r => r.trim());
                    if (rows.length < 2) return tableBlock;

                    // Check if second row is separator (|---|---|)
                    const isSep = /^\|[\s\-:]+\|/.test(rows[1]);
                    if (!isSep) return tableBlock;

                    const parseRow = (row) =>
                        row.split('|').slice(1, -1).map(c => c.trim());

                    const headers = parseRow(rows[0]);
                    const dataRows = rows.slice(2);

                    let html = '<table><thead><tr>';
                    for (const h of headers) html += `<th>${h}</th>`;
                    html += '</tr></thead><tbody>';
                    for (const row of dataRows) {
                        const cells = parseRow(row);
                        html += '<tr>';
                        for (const c of cells) html += `<td>${c}</td>`;
                        html += '</tr>';
                    }
                    html += '</tbody></table>';
                    return html;
                }
            );

            // Links
            processed = processed.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Paragraphs
            processed = processed.replace(/\n\n/g, '</p><p>');
            processed = processed.replace(/\n/g, '<br>');
            processed = `<p>${processed}</p>`;

            // Clean up empty/nested paragraphs around block elements
            processed = processed.replace(/<p>\s*<(h[1-3]|pre|ul|ol|blockquote)/g, '<$1');
            processed = processed.replace(/<\/(h[1-3]|pre|ul|ol|blockquote)>\s*<\/p>/g, '</$1>');
            processed = processed.replace(/<p>\s*<\/p>/g, '');
            processed = processed.replace(/<p><br>/g, '<p>');
            processed = processed.replace(/<br><\/p>/g, '</p>');

            // Step 4: Restore code blocks and inline code
            for (let i = 0; i < codeBlocks.length; i++) {
                processed = processed.replace(`\x00CB${i}\x00`, codeBlocks[i]);
            }
            for (let i = 0; i < inlineCodes.length; i++) {
                processed = processed.replace(`\x00IC${i}\x00`, inlineCodes[i]);
            }

            return processed;
        }

        // ── Init ──
        refreshSessions();
        setInterval(refreshSessions, 10000);
    </script>
</body>
</html>
